<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXILROBO AI</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="axilrobo_icon.png">
    <link rel="apple-touch-icon" href="axilrobo_icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        body { background: #050505; color: #00d4ff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .img-container {
            position: relative;
            width: 250px;
            margin-bottom: 20px;
        }

        #robo-img { 
            width: 100%; 
            border-radius: 20px; 
            box-shadow: 0 0 20px #00d4ff; 
            display: block;
        }

        .overlay-name {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            color: #00d4ff;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000, 0 0 10px #00d4ff;
        }

        #status { font-size: 1.1rem; color: #fff; margin-bottom: 20px; background: rgba(0,212,255,0.1); padding: 15px; border-radius: 10px; width: 85%; min-height: 50px; border: 1px solid #00d4ff; }
        .btn { background: #00d4ff; color: #000; border: none; padding: 20px 50px; font-size: 1.3rem; font-weight: bold; border-radius: 50px; cursor: pointer; margin: 10px; width: 80%; box-shadow: 0 0 10px #00d4ff; }
        #map-btn { background: #ffcc00; display: none; color: #000; }
    </style>
</head>
<body>

    <div class="img-container">
        <img id="robo-img" src="axilrobo_open.png">
        <div class="overlay-name">AXILROBO</div>
    </div>

    <div id="status">ΠΕΣ ΜΟΥ ΤΙ ΨΑΧΝΕΙΣ</div>
    <button class="btn" onclick="startApp()">ACTIVATE</button>
    <button id="map-btn" class="btn" onclick="openMap()">ΔΕΣ ΤΟΝ ΧΑΡΤΗ / ΟΔΟ</button>

    <script>
        const status = document.getElementById('status');
        const roboImg = document.getElementById('robo-img');
        const mapBtn = document.getElementById('map-btn');
        const synth = window.speechSynthesis;
        let currentQuery = "";

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'el-GR';
            
            // ΚΑΝΟΝΙΚΗ ΓΥΝΑΙΚΕΙΑ ΦΩΝΗ
            utterance.pitch = 1.0; 
            utterance.rate = 1.0;  

            roboImg.src = "axilrobo_closed.png";
            utterance.onend = () => { roboImg.src = "axilrobo_open.png"; };
            synth.speak(utterance);
        }

        async function startApp() {
            // Η ΝΕΑ ΦΡΑΣΗ ΠΟΥ ΖΗΤΗΣΕΣ
            speak("Αχιλλέα, ορίστε, τι θέλεις;");
            status.innerText = "ΑΧΙΛΛΕΑ ΟΡΙΣΤΕ ΤΙ ΘΕΛΕΙΣ;";

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'el-GR';

            recognition.onresult = async (event) => {
                currentQuery = event.results[0][0].transcript;
                status.innerText = "Αναζήτηση: " + currentQuery;

                try {
                    const response = await fetch(`https://el.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(currentQuery)}`);
                    const data = await response.json();
                    
                    if (data.extract) {
                        status.innerText = data.extract;
                        speak(data.extract);
                        mapBtn.style.display = "block";
                    } else {
                        speak("Αχιλλέα, σου βρήκα τη διεύθυνση. Πάτα το κίτρινο κουμπί.");
                        mapBtn.style.display = "block";
                    }
                } catch (e) {
                    mapBtn.style.display = "block";
                    speak("Πάτα το κουμπί για να δεις την οδό.");
                }
            };
            recognition.start();
        }

        function openMap() {
            window.open("https://www.google.com/search?q=" + encodeURIComponent(currentQuery), "_blank");
        }
    </script>
</body>
</html>
