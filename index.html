<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXILROBO AI</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="icon" type="image/png" href="axilrobo_icon.png">
    <link rel="apple-touch-icon" href="axilrobo_icon.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="AXILROBO">
    <meta name="theme-color" content="#050505">

    <style>
        body { 
            background: #050505; 
            color: #00d4ff; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }
        
        .image-container { 
            position: relative; 
            width: 280px; 
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 25px #00d4ff;
            margin-bottom: 10px;
        }
        
        #robo-img { 
            width: 100%; 
            display: block; 
        }

        /* ΤΑ 3D ΓΡΑΜΜΑΤΑ ΠΑΝΩ ΣΤΗΝ ΕΙΚΟΝΑ ΣΤΟ ΚΑΤΩ ΜΕΡΟΣ */
        .robo-name-3d {
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            color: #00d4ff;
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 
                0 1px 0 #008fb3, 
                0 2px 0 #007a99, 
                0 3px 0 #006680, 
                0 4px 0 #005266, 
                0 6px 4px rgba(0,0,0,0.8);
        }

        #status { 
            font-size: 1rem; 
            color: #fff; 
            margin: 15px 0; 
            background: rgba(0,212,255,0.1); 
            padding: 12px; 
            border-radius: 10px; 
            width: 85%; 
            border: 1px solid #00d4ff; 
            min-height: 45px; 
        }

        .btn { 
            background: #00d4ff; 
            color: #000; 
            border: none; 
            padding: 18px 50px; 
            font-size: 1.4rem; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,212,255,0.4);
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="image-container">
        <img id="robo-img" src="axilrobo_open.png">
        <div class="robo-name-3d">AXILROBO</div>
    </div>

    <div id="status">ΕΤΟΙΜΟΣ</div>
    
    <button class="btn" onclick="startApp()">ACTIVATE</button>

    <script>
        const status = document.getElementById('status');
        const roboImg = document.getElementById('robo-img');
        const synth = window.speechSynthesis;

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'el-GR';
            
            // Κίνηση στόματος
            roboImg.src = "axilrobo_closed.png";
            utterance.onend = () => { 
                roboImg.src = "axilrobo_open.png"; 
            };
            synth.speak(utterance);
        }

        async function startApp() {
            speak("Ακούω Αχιλλέα");
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Το κινητό δεν υποστηρίζει αναγνώριση φωνής.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'el-GR';

            recognition.onresult = (event) => {
                const query = event.results[0][0].transcript;
                status.innerText = "Ψάχνω: " + query;
                speak("Ψάχνω για " + query);
                
                // Άνοιγμα αναζήτησης μετά από 2 δευτερόλεπτα
                setTimeout(() => {
                    window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
                }, 2000);
            };
            
            recognition.start();
        }
    </script>
</body>
</html>
