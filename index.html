<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXILROBO AI</title>
    <style>
        body { background: #050505; color: #00d4ff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #robo-img { width: 200px; border-radius: 20px; box-shadow: 0 0 15px #00d4ff; margin: 20px auto; }
        #status { font-size: 1.1rem; color: #fff; margin-bottom: 15px; background: rgba(0,212,255,0.1); padding: 15px; border-radius: 15px; width: 85%; min-height: 80px; }
        .btn { background: #00d4ff; color: #000; border: none; padding: 20px 50px; font-size: 1.3rem; font-weight: bold; border-radius: 50px; cursor: pointer; margin-bottom: 10px; width: 80%; }
        #more-btn { background: #555; color: white; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <img id="robo-img" src="axilrobo_open.png">
    <div id="status">ΕΤΟΙΜΟΣ</div>
    <button class="btn" onclick="startApp()">ACTIVATE</button>
    <button id="more-btn" class="btn" onclick="openFullSearch()">ΔΕΣ ΠΕΡΙΣΣΟΤΕΡΑ</button>

    <script>
        const status = document.getElementById('status');
        const roboImg = document.getElementById('robo-img');
        const moreBtn = document.getElementById('more-btn');
        const synth = window.speechSynthesis;
        let lastQuery = "";

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'el-GR';
            utterance.rate = 1.0;
            roboImg.src = "axilrobo_closed.png";
            utterance.onend = () => { roboImg.src = "axilrobo_open.png"; };
            synth.speak(utterance);
        }

        async function startApp() {
            speak("Ακούω");
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'el-GR';

            recognition.onresult = async (event) => {
                lastQuery = event.results[0][0].transcript;
                status.innerText = "Αναζήτηση: " + lastQuery;

                try {
                    // Παίρνουμε την απάντηση απευθείας για να την ΔΙΑΒΑΣΕΙ
                    const response = await fetch(`https://el.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(lastQuery)}`);
                    const data = await response.json();
                    
                    if (data.extract) {
                        status.innerText = data.extract;
                        speak(data.extract);
                        moreBtn.style.display = "block"; // Εμφανίζει το κουμπί αν θες να πας στη Google
                    } else {
                        speak("Αχιλλέα, δεν βρήκα έτοιμη απάντηση. Πάτα το κουμπί για να δεις στη Google.");
                        moreBtn.style.display = "block";
                    }
                } catch (e) {
                    speak("Υπήρξε ένα πρόβλημα.");
                    moreBtn.style.display = "block";
                }
            };
            recognition.start();
        }

        function openFullSearch() {
            window.open("https://www.google.com/search?q=" + encodeURIComponent(lastQuery), "_blank");
        }
    </script>
</body>
</html>
