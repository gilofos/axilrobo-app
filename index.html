<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXILROBO Mobile</title>
    <style>
        body { 
            background-color: #050505; 
            color: #00d4ff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 { 
            font-size: 2.8rem; 
            letter-spacing: 4px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 20px #00d4ff;
            font-weight: 900;
        }
        #robo-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        #robo-img { 
            width: 100%; 
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            transition: transform 0.2s;
        }
        #status-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #111;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
            margin: 20px 0;
            min-height: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            background: linear-gradient(145deg, #00d4ff, #008fb3);
            color: #000;
            border: none;
            padding: 22px 60px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.4);
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn:active {
            transform: scale(0.9);
            box-shadow: 0 5px 10px rgba(0, 212, 255, 0.2);
        }
    </style>
</head>
<body>

    <h1>AXILROBO</h1>

    <div id="robo-container">
        <img id="robo-img" src="axilrobo_open.png" alt="AXILROBO">
    </div>

    <div id="status-box">
        <span id="display-text">ΠΑΤΑ ΓΙΑ ΕΚΚΙΝΗΣΗ</span>
    </div>

    <button class="btn" onclick="startListening()">ACTIVATE</button>

    <script>
        const displayText = document.getElementById('display-text');
        const roboImg = document.getElementById('robo-img');
        let synth = window.speechSynthesis;

        function startListening() {
            // 1. Ξεκλειδώνουμε τον ήχο αμέσως (απαραίτητο για κινητά)
            const unlockInput = new SpeechSynthesisUtterance('');
            synth.speak(unlockInput);

            // 2. Έλεγχος αν υποστηρίζεται η αναγνώριση φωνής
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Ο browser δεν υποστηρίζει φωνητική αναγνώριση. Χρησιμοποίησε Chrome ή Safari.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'el-GR';
            recognition.interimResults = false;

            recognition.onstart = () => {
                displayText.innerText = "ΣΕ ΑΚΟΥΩ, ΑΧΙΛΛΕΑ...";
                displayText.style.color = "#ffff00";
                roboImg.style.transform = "scale(1.05)";
            };

            recognition.onerror = (event) => {
                displayText.innerText = "ΚΑΤΙ ΠΗΓΕ ΣΤΡΑΒΑ...";
                displayText.style.color = "#ff4444";
                roboImg.style.transform = "scale(1)";
            };

            recognition.onresult = (event) => {
                const resultText = event.results[0][0].transcript;
                displayText.innerText = "ΕΙΠΕΣ: " + resultText;
                displayText.style.color = "#ffffff";
                
                // Φωνητική απάντηση και ΜΕΤΑ μετάβαση στη Google
                speak("Αχιλλέα, ψάχνω για " + resultText, () => {
                    setTimeout(() => {
                        window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(resultText);
                    }, 800);
                });
            };

            recognition.start();
        }

        function speak(text, callback) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'el-GR';
            utterance.pitch = 1;
            utterance.rate = 0.9; // Λίγο πιο αργά για να ακούγεται καθαρά

            // Blink effect: Κλείνει τα μάτια όταν ξεκινάει να μιλάει
            roboImg.src = "axilrobo_closed.png";
            
            utterance.onend = () => {
                // Ανοίγει τα μάτια όταν τελειώσει
                roboImg.src = "axilrobo_open.png";
                if (callback) callback();
            };

            synth.speak(utterance);
        }
    </script>
</body>
</html>
