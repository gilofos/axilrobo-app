<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXILROBO AI</title>
    <style>
        body { background: #050505; color: #00d4ff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #robo-img { width: 180px; border-radius: 20px; box-shadow: 0 0 20px #00d4ff; margin: 20px auto; }
        #status-text { font-size: 1.2rem; color: #fff; margin: 15px; background: rgba(0,212,255,0.1); padding: 20px; border-radius: 15px; border: 1px solid #00d4ff; width: 85%; min-height: 100px; text-align: left; }
        .btn { background: #00d4ff; color: #000; border: none; padding: 20px 60px; font-size: 1.4rem; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,212,255,0.4); }
    </style>
</head>
<body>

    <img id="robo-img" src="axilrobo_open.png">
    <div id="status-text">ΠΕΡΙΜΕΝΩ ΕΝΤΟΛΗ...</div>
    <button class="btn" onclick="startApp()">ACTIVATE</button>

    <script>
        const statusBox = document.getElementById('status-text');
        const roboImg = document.getElementById('robo-img');
        const synth = window.speechSynthesis;

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'el-GR';
            utterance.rate = 1.0;
            
            roboImg.src = "axilrobo_closed.png";
            utterance.onend = () => { roboImg.src = "axilrobo_open.png"; };
            
            synth.speak(utterance);
        }

        async function startApp() {
            speak("Ακούω");
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'el-GR';

            recognition.onresult = async (event) => {
                const query = event.results[0][0].transcript;
                statusBox.innerText = "Ψάχνω για: " + query;

                try {
                    // Τραβάμε την απάντηση απευθείας από την Wikipedia
                    const response = await fetch(`https://el.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                    const data = await response.json();
                    
                    if (data.extract) {
                        statusBox.innerText = data.extract; // Το γράφει στην οθόνη
                        speak(data.extract); // ΤΟ ΔΙΑΒΑΖΕΙ ΟΛΟ
                    } else {
                        speak("Αχιλλέα, δεν βρήκα συγκεκριμένο κείμενο για " + query + ", δες τα αποτελέσματα στη Google.");
                        setTimeout(() => {
                            window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
                        }, 3000);
                    }
                } catch (e) {
                    speak("Κάτι πήγε στραβά με τη σύνδεση.");
                }
            };
            recognition.start();
        }
    </script>
</body>
</html>
