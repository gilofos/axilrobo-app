<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXILROBO AI</title>
    <style>
        body { background: #050505; color: #00d4ff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #robo-img { width: 150px; border-radius: 20px; box-shadow: 0 0 15px #00d4ff; margin: 10px auto; }
        #status { font-size: 1rem; color: #fff; margin-bottom: 10px; min-height: 20px; }
        .btn { background: #00d4ff; color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; margin-bottom: 10px; }
        #results-container { width: 100%; flex-grow: 1; border: 2px solid #00d4ff; border-radius: 15px; overflow: hidden; background: white; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <img id="robo-img" src="axilrobo_open.png">
    <div id="status">ΕΤΟΙΜΟΣ</div>
    <button id="main-btn" class="btn" onclick="startApp()">ACTIVATE</button>

    <div id="results-container">
        <iframe id="results-frame" src=""></iframe>
    </div>

    <script>
        const status = document.getElementById('status');
        const roboImg = document.getElementById('robo-img');
        const frame = document.getElementById('results-frame');
        const container = document.getElementById('results-container');
        const synth = window.speechSynthesis;

        function speak(text, callback) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'el-GR';
            utterance.rate = 0.9;
            roboImg.src = "axilrobo_closed.png";
            utterance.onend = () => { 
                roboImg.src = "axilrobo_open.png"; 
                if(callback) callback();
            };
            synth.speak(utterance);
        }

        async function startApp() {
            speak("Σε ακούω Αχιλλέα");
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'el-GR';

            recognition.onresult = async (event) => {
                const query = event.results[0][0].transcript;
                status.innerText = "Αναζήτηση: " + query;

                // ΠΡΩΤΑ προσπαθεί να βρει κείμενο για να το ΔΙΑΒΑΣΕΙ
                try {
                    const response = await fetch(`https://el.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                    const data = await response.json();
                    
                    let speechText = "Αχιλλέα, σου φέρνω τις πληροφορίες για " + query + ". ";
                    if (data.extract) {
                        speechText += data.extract; // Προσθέτει το κείμενο της Wikipedia στην ομιλία
                    }

                    speak(speechText, () => {
                        // ΜΟΛΙΣ ΤΕΛΕΙΩΣΕΙ Η ΟΜΙΛΙΑ (ή ταυτόχρονα), ανοίγει το παράθυρο που είχες
                        container.style.display = "block";
                        frame.src = "https://www.bing.com/search?q=" + encodeURIComponent(query);
                    });

                } catch (e) {
                    speak("Σου ανοίγω τα αποτελέσματα Αχιλλέα.");
                    container.style.display = "block";
                    frame.src = "https://www.bing.com/search?q=" + encodeURIComponent(query);
                }
            };
            recognition.start();
        }
    </script>
</body>
</html>
